<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Vault</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="app-header">
        <h1 class="logo-text">Vault</h1>
        <button onclick="document.getElementById('vault-upload').click()" class="btn-primary" style="width:auto; padding:10px 20px;">+ Add File</button>
        <input type="file" id="vault-upload" hidden>
    </header>

    <div class="app-container">
        <!-- Category Selector -->
        <div class="category-pills">
            <div class="pill active" onclick="setCategory('all', this)">All</div>
            <div class="pill" onclick="setCategory('id', this)">🆔 ID Cards</div>
            <div class="pill" onclick="setCategory('finance', this)">💰 Finance</div>
            <div class="pill" onclick="setCategory('health', this)">🏥 Health</div>
        </div>

        <div id="vault-grid" class="file-grid">
            <div class="loader">Loading your secure files...</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link"><i class="ri-home-5-line"></i><span>Home</span></a>
        <a href="vault.html" class="nav-link active"><i class="ri-shield-lock-fill"></i><span>Vault</span></a>
        <a href="expenses.html" class="nav-link"><i class="ri-wallet-3-line"></i><span>Spent</span></a>
        <a href="reminders.html" class="nav-link"><i class="ri-notification-3-line"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-3-line"></i><span>Profile</span></a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script src="js/api.js"></script> <!-- Ye line zaroori hai -->
    <script src="js/vault.js"></script>
</body>
</html>
