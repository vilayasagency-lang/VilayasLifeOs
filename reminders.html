<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alerts | LifeOS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="app-header">
        <div class="logo-brand">Alerts</div>
        <button onclick="openModal()" style="background:var(--primary); border:none; color:white; padding:8px 16px; border-radius:12px; font-weight:800; font-size:0.75rem;">+ SET ALERT</button>
    </header>

    <div style="padding: 0 20px;">
        <div id="reminders-list" style="margin-top:10px;">
            <p style="text-align:center; padding:50px; opacity:0.3;">Loading schedules...</p>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="rem-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; align-items:flex-end;">
        <div class="bottom-sheet" style="width:100%;">
            <h3 id="modal-title" style="margin-bottom:20px; font-weight:800;">New Life Alert</h3>
            <form id="reminder-form">
                <input type="text" id="rtitle" placeholder="Alert Title (e.g. Health Insurance)" required>
                <input type="datetime-local" id="rtime" required>
                <button type="submit" id="rsubmit" class="btn-primary">ACTIVATE NEON ALERT</button>
                <button type="button" onclick="closeModal()" style="width:100%; background:none; border:none; color:var(--text-dim); margin-top:15px; font-weight:600;">DISMISS</button>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link"><i class="ri-home-6-line"></i><span>Home</span></a>
        <a href="vault.html" class="nav-link"><i class="ri-shield-keyhole-line"></i><span>Vault</span></a>
        <a href="expenses.html" class="nav-link"><i class="ri-wallet-line"></i><span>Spent</span></a>
        <a href="reminders.html" class="nav-link active"><i class="ri-notification-3-fill"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-heart-line"></i><span>Profile</span></a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script src="js/reminders.js"></script>
    <script>
        function openModal() { document.getElementById('rem-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('rem-modal').style.display = 'none'; }
    </script>
</body>
</html>
