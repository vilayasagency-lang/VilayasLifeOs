<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LifeOS | Future of Personal Infrastructure</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="pwa/manifest.json">
    <style>
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle at top, #1e293b, #0b0f1a); padding: 30px; }
        .hero h1 { font-size: 3rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -2px; }
        .hero span { color: var(--primary); }
        .hero p { color: var(--text-dim); margin-bottom: 40px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="hero">
        <h1 class="fade-in">Life<span>OS</span></h1>
        <p>Your entire life infrastructure, <br>secured in one single app.</p>
        <button onclick="location.href='signup.html'" class="btn-primary" style="margin-bottom: 15px;">Get Started Free</button>
        <a href="login.html" style="color: white; text-decoration: none; font-weight: 600; font-size: 0.9rem;">Sign In to your OS</a>
    </div>

    <script>
        // Check if already logged in, redirect to dashboard
        window.onload = async () => {
            if (localStorage.getItem('supabase.auth.token')) {
                window.location.replace('dashboard.html');
            }
        };
    </script>
</body>
</html>
