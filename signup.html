<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | LifeOS</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Join LifeOS</h2>
                <p>Start organizing your digital life today.</p>
            </div>
            
            <form id="signup-form" class="auth-form">
    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullname" placeholder="John Doe" required>
    </div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="name@example.com" required>
    </div>

    <!-- Naye Fields -->
    <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" id="phone" placeholder="+91 0000000000" required>
    </div>

    <div class="form-row" style="display:flex; gap:10px;">
        <div class="form-group" style="flex:1;">
            <label>Gender</label>
            <select id="gender" required>
                <option value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="form-group" style="flex:1;">
            <label>Date of Birth</label>
            <input type="date" id="dob" required>
        </div>
    </div>
    
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" minlength="6" required>
    </div>

    <button type="submit" class="btn-primary" id="signup-btn">Create Account</button>
</form>

            <div class="auth-footer">
                <p>Already have an account? <a href="/login.html">Login</a></p>
                <p class="terms">By signing up, you agree to our Terms & Privacy.</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/supabase-config.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
