<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | LifeOS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="app-header">
        <div class="logo" style="text-shadow: 0 0 20px var(--primary);">Life<span>OS</span></div>
        <div style="display:flex; gap:15px; align-items:center;">
             <i class="ri-notification-3-line" style="font-size: 1.4rem;"></i>
             <img id="head-avatar" src="https://ui-avatars.com/api/?name=User" style="width:35px; height:35px; border-radius:50%; border:2px solid var(--primary);">
        </div>
    </header>

    <div class="welcome" style="margin-bottom: 30px;">
        <h1 id="greeting" style="font-size: 2.2rem; font-weight: 800; letter-spacing: -1px;">Hi, Loading...</h1>
        <p id="current-date" style="color:var(--text-dim); font-weight:600;"></p>
    </div>

    <div class="content">
        <!-- 3D Spends Card -->
        <div class="card" onclick="location.href='expenses.html'" style="border-left: 8px solid var(--primary); background: linear-gradient(135deg, rgba(0,210,255,0.15), var(--card)); overflow:hidden; position:relative;">
            <p>TOTAL MONTHLY SPEND</p>
            <h2 id="total-spent" style="font-size:2.8rem; color:var(--primary); margin: 5px 0;">₹0</h2>
            <div style="width:100%; height:6px; background:rgba(255,255,255,0.05); border-radius:10px;">
                <div style="width:65%; height:100%; background:var(--primary); box-shadow: 0 0 15px var(--primary);"></div>
            </div>
            <i class="ri-wallet-3-fill" style="position:absolute; right:-10px; bottom:-10px; font-size:6rem; opacity:0.05;"></i>
        </div>

        <!-- 3D Vault Card -->
        <div class="card" onclick="location.href='vault.html'" style="display:flex; justify-content:space-between; align-items:center; border: 1px solid var(--border);">
            <div>
                <p>SECURED DOCUMENTS</p>
                <h2 id="files-count">0 Files</h2>
            </div>
            <i class="ri-shield-flash-fill" style="font-size:3.5rem; color:var(--secondary); filter: drop-shadow(0 0 10px var(--secondary));"></i>
        </div>

        <!-- Alerts Sneak Peek -->
        <div class="card" onclick="location.href='reminders.html'" style="background: rgba(255,0,122,0.05); border: 1px solid rgba(255,0,122,0.2);">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <p style="color:var(--accent); margin:0;">PENDING ALERTS</p>
                <span class="badge" style="background:var(--accent); color:white; padding:2px 8px; border-radius:5px; font-size:0.7rem;">Active</span>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link active"><i class="ri-home-5-fill"></i><span>Home</span></a>
        <a href="vault.html" class="nav-link"><i class="ri-shield-lock-line"></i><span>Vault</span></a>
        <a href="expenses.html" class="nav-link"><i class="ri-wallet-3-line"></i><span>Spent</span></a>
        <a href="reminders.html" class="nav-link"><i class="ri-notification-3-line"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-3-line"></i><span>Profile</span></a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
