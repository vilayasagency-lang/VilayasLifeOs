<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LifeOS Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="app-header">
        <div class="logo">LifeOS</div>
        <div class="user-avatar" onclick="location.href='profile.html'">
            <img id="header-avatar" src="https://ui-avatars.com/api/?name=User" style="width:40px; border-radius:50%;">
        </div>
    </header>

    <div class="app-container">
        <h2 id="greeting" style="margin-bottom: 5px;">Hello, Loading...</h2>
        <p id="date" style="color: var(--text-dim); margin-bottom: 25px;">Today</p>

        <!-- Stats Grid -->
        <div class="card" onclick="location.href='expenses.html'">
            <p style="color:var(--text-dim)">Monthly Spend</p>
            <h1 id="total-expense">₹0</h1>
        </div>

        <div class="card" onclick="location.href='vault.html'">
            <p style="color:var(--text-dim)">Vault Security</p>
            <h3><span id="vault-count">0</span> Files Secure</h3>
        </div>

        <div class="card" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8);">
            <h3>Upgrade to Pro</h3>
            <p>Get 50GB R2 Cloud Storage</p>
        </div>
    </div>

    <!-- Bottom App Navigation -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><i class="ri-home-line"></i>Home</a>
        <a href="vault.html" class="nav-item"><i class="ri-lock-line"></i>Vault</a>
        <a href="expenses.html" class="nav-item"><i class="ri-wallet-line"></i>Spend</a>
        <a href="profile.html" class="nav-item"><i class="ri-user-line"></i>Profile</a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
