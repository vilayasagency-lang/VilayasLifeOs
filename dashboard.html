<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Home | LifeOS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="brand">Life<span>OS</span></div>
        <i class="ri-notification-3-line" style="font-size: 1.4rem;"></i>
    </header>

    <div class="container fade-in">
        <div style="margin-bottom: 30px;">
            <h1 id="user-name" style="font-size: 2.2rem; font-weight: 800;">Hi, Chief</h1>
            <p id="today-date" style="color: var(--text-dim); font-weight: 600;"></p>
        </div>

        <!-- 3D Spend Card -->
        <div class="card" onclick="location.href='expenses.html'" style="border-left: 6px solid var(--primary);">
            <p style="font-size: 0.7rem; font-weight: 800; letter-spacing: 1px;">MONTHLY SPEND</p>
            <h2 id="total-spent" style="font-size: 2.5rem; margin: 5px 0; color: var(--primary);">₹0</h2>
            <div style="width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 10px;">
                <div style="width: 45%; height: 100%; background: var(--primary); box-shadow: 0 0 15px var(--primary);"></div>
            </div>
        </div>

        <!-- 3D Vault Card -->
        <div class="card" onclick="location.href='vault.html'" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <p style="font-size: 0.7rem; font-weight: 800;">SECURED VAULT</p>
                <h2 id="vault-count">0 Files</h2>
            </div>
            <i class="ri-shield-flash-fill" style="font-size: 3rem; color: var(--accent); filter: drop-shadow(0 0 10px var(--accent));"></i>
        </div>
        
        <!-- Alerts Status -->
        <div class="card" onclick="location.href='reminders.html'" style="background: rgba(239, 68, 68, 0.05); border-color: rgba(239, 68, 68, 0.2);">
            <div class="flex-between">
                <p style="margin:0; font-weight: 700; color: var(--danger);">PENDING ALERTS</p>
                <i class="ri-arrow-right-s-line"></i>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link active"><i class="ri-home-6-fill"></i><span>Home</span></a>
        <a href="vault.html" class="nav-link"><i class="ri-shield-keyhole-line"></i><span>Vault</span></a>
        <a href="expenses.html" class="nav-link"><i class="ri-wallet-line"></i><span>Spent</span></a>
        <a href="reminders.html" class="nav-link"><i class="ri-notification-3-line"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-6-line"></i><span>Profile</span></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
