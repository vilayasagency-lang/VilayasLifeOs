<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LifeOS Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="app-header">
        <div class="logo">Life<span>OS</span></div>
        <i class="ri-notification-3-line" style="font-size: 1.4rem;"></i>
    </header>

    <div class="welcome">
        <h1 id="greeting">Hi, Loading...</h1>
        <p id="current-date" style="color:var(--text-dim)">Checking session...</p>
    </div>

    <div class="card mt-20" onclick="location.href='expenses.html'" style="margin-top:20px;">
        <p>Monthly Expenses</p>
        <h2 id="total-spent">₹0</h2>
        <span style="color:var(--primary); font-size: 0.75rem;">View Analytics →</span>
    </div>

    <div class="card" onclick="location.href='vault.html'">
        <p>Secure Vault</p>
        <h2 id="files-count">0 Files</h2>
        <span style="color:var(--text-dim); font-size: 0.75rem;">Last added: Just now</span>
    </div>

    <div class="pro-banner">
        <h3>LifeOS Pro</h3>
        <p style="font-size: 0.8rem; opacity: 0.9;">1TB Storage & Family Tracking</p>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link active"><i class="ri-home-5-fill"></i><span>Home</span></a>
        <a href="vault.html" class="nav-link"><i class="ri-shield-lock-line"></i><span>Vault</span></a>
        <a href="expenses.html" class="nav-link"><i class="ri-wallet-3-line"></i><span>Spent</span></a>
        <a href="reminders.html" class="nav-link"><i class="ri-notification-badge-line"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-3-line"></i><span>Profile</span></a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
