<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LifeOS Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Remix Icons library for the Bottom Nav -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="app-header">
        <div class="logo">LifeOS</div>
        <div class="header-icons">
            <i class="ri-notification-3-line" style="font-size: 1.5rem;"></i>
        </div>
    </header>

    <div class="content">
        <div class="welcome-section">
            <h1 id="user-greeting">Hi, Loading...</h1>
            <p id="current-date" style="color: var(--text-dim);"></p>
        </div>

        <div class="mt-20">
            <!-- Summary Stats -->
            <div class="card" onclick="location.href='expenses.html'">
                <h3>Monthly Expenses</h3>
                <h2 id="total-spent">₹0</h2>
                <p style="color:var(--primary); font-size: 0.8rem;">Tap to see breakdown →</p>
            </div>

            <div class="card" onclick="location.href='vault.html'">
                <h3>Vault Security</h3>
                <h2 id="files-count">0 Files</h2>
                <p style="color:var(--text-dim); font-size: 0.8rem;">Encrypted & Protected</p>
            </div>

            <div class="card" style="background: linear-gradient(135deg, #1d4ed8, #3b82f6);">
                <h3 style="color: white;">Upgrade to Pro</h3>
                <p style="color: rgba(255,255,255,0.8);">Get 50GB R2 Cloud Storage</p>
            </div>
        </div>
    </div>

    <!-- CLEAN BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link active">
            <i class="ri-home-5-fill"></i>
            <span>Home</span>
        </a>
        <a href="vault.html" class="nav-link">
            <i class="ri-shield-lock-line"></i>
            <span>Vault</span>
        </a>
        <a href="expenses.html" class="nav-link">
            <i class="ri-wallet-3-line"></i>
            <span>Spent</span>
        </a>
        <a href="reminders.html" class="nav-link">
            <i class="ri-calendar-todo-line"></i>
            <span>Alerts</span>
        </a>
        <a href="profile.html" class="nav-link">
            <i class="ri-user-settings-line"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
