<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade | LifeOS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script> <!-- Cashfree SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<body>
    <header class="app-header">
        <div class="logo">Upgrade</div>
        <i class="ri-vip-crown-fill" style="color:gold; font-size:1.5rem;"></i>
    </header>

    <div class="app-container">
        <div class="pro-banner" style="text-align:center; padding:40px 20px;">
            <h1 style="color:white; font-size:2rem; margin-bottom:10px;">Go Premium</h1>
            <p style="color:rgba(255,255,255,0.8);">Unlock the full potential of your Life Infrastructure.</p>
        </div>

        <div class="card" style="margin-top:-30px; position:relative; z-index:2;">
            <h2 style="text-align:center; margin-bottom:20px;">₹199<span style="font-size:1rem; color:var(--text-dim);">/month</span></h2>
            <ul style="list-style:none; padding:0; margin-bottom:25px;">
                <li style="margin-bottom:12px;"><i class="ri-checkbox-circle-fill" style="color:#10b981;"></i> 1TB R2 Cloud Storage</li>
                <li style="margin-bottom:12px;"><i class="ri-checkbox-circle-fill" style="color:#10b981;"></i> Family SOS Hub Access</li>
                <li style="margin-bottom:12px;"><i class="ri-checkbox-circle-fill" style="color:#10b981;"></i> Real-time Bill Alerts</li>
            </ul>
            <button id="pay-btn" class="btn-primary">Pay Securely</button>
            <p style="text-align:center; font-size:0.7rem; color:var(--text-dim); margin-top:15px;">🔒 Secured by Cashfree Payments</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link"><i class="ri-home-5-line"></i><span>Home</span></a>
        <a href="vault.html" class="nav-link"><i class="ri-shield-lock-line"></i><span>Vault</span></a>
        <a href="expenses.html" class="nav-link"><i class="ri-wallet-3-line"></i><span>Spent</span></a>
        <a href="reminders.html" class="nav-link"><i class="ri-notification-3-line"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-link active"><i class="ri-user-3-fill"></i><span>Profile</span></a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/subscription.js"></script>
</body>
</html>
