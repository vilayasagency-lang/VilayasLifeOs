<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="profile-top" style="text-align:center; padding: 20px 0;">
        <div style="position:relative; display:inline-block;">
            <img id="profile-pic" src="https://ui-avatars.com/api/?name=User" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--primary);">
            <input type="file" id="avatar-input" hidden>
            <button onclick="document.getElementById('avatar-input').click()" style="position:absolute; bottom:0; right:0; background:var(--primary); color:white; border:none; border-radius:50%; width:30px; height:30px;"><i class="ri-camera-line"></i></button>
        </div>
        <h2 id="p-name" style="margin-top:10px;">Loading...</h2>
        <span style="font-size: 0.7rem; color: var(--primary); font-weight: 700;">FREE ACCOUNT</span>
    </div>

    <div class="pro-banner" style="margin-bottom: 20px;">
        <h3>Upgrade to Pro</h3>
        <p>Unlock 1TB Cloud & SOS Alerts</p>
        <button class="btn-primary" style="background:white; color:var(--primary); padding:10px; margin-top:10px;">Get Started</button>
    </div>

    <div class="card" style="padding:0;">
        <input type="text" id="edit-name" placeholder="Full Name" style="border:none; border-bottom:1px solid var(--border); border-radius:0;">
        <input type="tel" id="edit-phone" placeholder="Mobile Number" style="border:none; border-radius:0;">
    </div>
    
    <button onclick="updateProfile()" class="btn-primary">Save Profile</button>
    <button onclick="logout()" style="width:100%; background:none; border:none; color:var(--danger); margin-top:20px; font-weight:700;">Logout Account</button>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link"><i class="ri-home-5-line"></i><span>Home</span></a>
        <a href="vault.html" class="nav-link"><i class="ri-shield-lock-line"></i><span>Vault</span></a>
        <a href="expenses.html" class="nav-link"><i class="ri-wallet-3-line"></i><span>Spent</span></a>
        <a href="reminders.html" class="nav-link"><i class="ri-notification-badge-line"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-link active"><i class="ri-user-3-fill"></i><span>Profile</span></a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
