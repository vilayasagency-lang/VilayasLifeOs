<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Profile | LifeOS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="app-header">
        <div class="logo-brand">LifeOS</div>
        <i class="ri-settings-4-fill" style="font-size: 1.5rem; color: var(--text-dim);"></i>
    </header>

    <div style="padding: 0 20px;">
        <!-- Avatar Section -->
        <div class="profile-hero">
            <div class="avatar-container">
                <img id="profile-avatar" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff">
                <div class="edit-badge" onclick="document.getElementById('avatar-input').click()">
                    <i class="ri-camera-lens-fill"></i>
                </div>
                <input type="file" id="avatar-input" hidden accept="image/*">
            </div>
            <h2 id="display-name" style="margin-top: 15px; font-weight: 800;">Bhavesh Swain</h2>
            <p id="display-email" style="color: var(--text-dim); font-size: 0.85rem;">bhavesh.swain@gmail.com</p>
        </div>

        <!-- Pro Banner -->
        <div class="card" style="background: linear-gradient(135deg, #1d4ed8, #6366f1); border:none;">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <h3 style="color:white; font-weight:800;">LifeOS Pro</h3>
                <span style="background:rgba(255,255,255,0.2); padding:4px 10px; border-radius:10px; font-size:0.7rem; color:white; font-weight:800;">FREE</span>
            </div>
            <p style="color:rgba(255,255,255,0.8); font-size:0.8rem; margin: 10px 0;">Unlock 1TB R2 Storage & SOS Tracking.</p>
            <button class="btn-primary" style="background:white; color:#1d4ed8; padding:12px; box-shadow:none;">UPGRADE NOW</button>
        </div>

        <!-- Edit Form -->
        <div class="card">
            <div class="form-group" style="margin-bottom:20px;">
                <label style="color:var(--text-dim); font-size:0.75rem; font-weight:700;">FULL NAME</label>
                <input type="text" id="edit-fullname">
            </div>
            <div class="form-group" style="margin-bottom:20px;">
                <label style="color:var(--text-dim); font-size:0.75rem; font-weight:700;">MOBILE NUMBER</label>
                <input type="tel" id="edit-phone">
            </div>
            <div class="form-group" style="margin-bottom:25px;">
                <label style="color:var(--text-dim); font-size:0.75rem; font-weight:700;">GENDER</label>
                <select id="edit-gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <button onclick="saveProfileUpdates()" class="btn-primary" id="save-btn">SAVE CHANGES</button>
        </div>

        <!-- Danger Zone (Logout) -->
        <div class="card danger-zone" onclick="logoutUser()">
            <div style="display:flex; align-items:center; gap:15px; color: #ef4444;">
                <i class="ri-logout-circle-r-line" style="font-size:1.5rem;"></i>
                <div style="font-weight:800;">LOGOUT ACCOUNT</div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link"><i class="ri-home-6-line"></i><span>Home</span></a>
        <a href="vault.html" class="nav-link"><i class="ri-shield-keyhole-line"></i><span>Vault</span></a>
        <a href="expenses.html" class="nav-link"><i class="ri-wallet-line"></i><span>Spent</span></a>
        <a href="reminders.html" class="nav-link"><i class="ri-notification-3-line"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-link active"><i class="ri-user-heart-fill"></i><span>Profile</span></a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
    <script>
        async function logoutUser() {
            if(confirm("Logout from LifeOS?")) {
                await supabase.auth.signOut();
                window.location.replace('login.html');
            }
        }
    </script>
</body>
</html>
