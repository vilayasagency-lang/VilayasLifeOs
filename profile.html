<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile Settings | LifeOS</title>
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="app-header">
        <div class="logo">Profile</div>
        <button id="logout-btn" style="background:none; border:none; color:var(--danger); font-weight:700; font-size:0.9rem;">Logout</button>
    </header>

    <div class="app-container">
        <!-- Profile Picture Section -->
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="position: relative; display: inline-block;">
                <img id="profile-avatar" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff" style="width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--card); object-fit: cover;">
                <input type="file" id="avatar-input" accept="image/*" hidden>
                <div class="edit-badge" onclick="document.getElementById('avatar-input').click()">
                    <i class="ri-camera-fill"></i>
                </div>
            </div>
            <h2 id="display-name" style="margin-top: 15px; font-weight: 800;">User Name</h2>
            <p id="display-email" style="color: var(--text-dim); font-size: 0.85rem;">user@example.com</p>
        </div>

        <!-- Subscription Pro Banner -->
        <div class="pro-banner" style="margin-bottom: 25px; position: relative; overflow: hidden;">
            <div style="position: relative; z-index: 2;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <h3 style="color: white; font-weight: 800;">LifeOS Pro</h3>
                    <span class="badge" id="plan-status">FREE</span>
                </div>
                <p style="color: rgba(255,255,255,0.8); font-size: 0.8rem; margin: 10px 0 15px;">Unlock 1TB R2 Storage, Family Tracking & Priority Alerts.</p>
                <button class="btn-primary" style="background: white; color: var(--primary); padding: 12px; font-size: 0.9rem;">Upgrade Now</button>
            </div>
            <i class="ri-vip-crown-fill" style="position: absolute; right: -10px; bottom: -10px; font-size: 6rem; color: rgba(255,255,255,0.1);"></i>
        </div>

        <!-- Edit Profile Form -->
        <div class="card">
            <h3 style="margin-bottom: 20px; font-size: 1rem;"><i class="ri-user-settings-line"></i> Personal Details</h3>
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="edit-fullname" placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="edit-phone" placeholder="+91 00000 00000">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select id="edit-gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <button onclick="saveProfileUpdates()" class="btn-primary" id="save-profile-btn">Save Changes</button>
        </div>

        <p style="text-align: center; color: var(--text-dim); font-size: 0.7rem; margin-top: 30px;">
            LifeOS v1.0 • Built for Billion-Dollar Scale
        </p>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link">
            <i class="ri-home-5-line"></i>
            <span>Home</span>
        </a>
        <a href="vault.html" class="nav-link">
            <i class="ri-shield-lock-line"></i>
            <span>Vault</span>
        </a>
        <a href="expenses.html" class="nav-link">
            <i class="ri-wallet-3-line"></i>
            <span>Spent</span>
        </a>
        <a href="reminders.html" class="nav-link">
            <i class="ri-notification-3-line"></i>
            <span>Alerts</span>
        </a>
        <a href="profile.html" class="nav-link active">
            <i class="ri-user-3-fill"></i>
            <span>Profile</span>
        </a>
    </nav>

    <style>
        .edit-badge {
            position: absolute; bottom: 0; right: 5px; 
            background: var(--primary); color: white; 
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--bg); font-size: 1rem;
        }
        .badge {
            background: rgba(255,255,255,0.2); color: white;
            padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800;
        }
    </style>

    <!-- Scripts Order -->
    <script src="js/supabase-config.js"></script>
    <script src="js/api.js"></script> 
    <script src="js/profile.js"></script>
</body>
</html>
