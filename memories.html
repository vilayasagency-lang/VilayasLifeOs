<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories | LifeOS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="app-header">
        <div class="logo">Memories</div>
        <button onclick="document.getElementById('mem-upload').click()" class="btn-primary" style="width:auto; padding:8px 15px;">+ Add Moment</button>
        <input type="file" id="mem-upload" accept="image/*" hidden>
    </header>

    <div class="app-container">
        <div id="memories-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <p style="grid-column: span 2; text-align:center; padding:50px; color:var(--text-dim);">Loading moments...</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link"><i class="ri-home-5-line"></i><span>Home</span></a>
        <a href="vault.html" class="nav-link"><i class="ri-shield-lock-line"></i><span>Vault</span></a>
        <a href="expenses.html" class="nav-link"><i class="ri-wallet-3-line"></i><span>Spent</span></a>
        <a href="reminders.html" class="nav-link"><i class="ri-notification-3-line"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-3-line"></i><span>Profile</span></a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/memories.js"></script>
</body>
</html>
