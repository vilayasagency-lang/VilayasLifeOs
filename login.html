<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | LifeOS</title>
    <!-- Remix Icons for modern look -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="color: var(--primary); font-weight: 800; font-size: 2rem;">Life<span>OS</span></h1>
                <p style="color: var(--text-dim); margin-top: 10px;">Login to manage your life infrastructure</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary" id="login-btn">Login to Dashboard</button>
            </form>

            <div style="text-align: center; margin-top: 25px; font-size: 0.9rem;">
                <p style="color: var(--text-dim);">Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create one</a></p>
                <a href="#" style="color: var(--text-dim); display: block; margin-top: 15px; text-decoration: none;">Forgot password?</a>
            </div>
        </div>
    </div>

    <!-- Scripts Order (BOHOT ZAROORI HAI) -->
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
