<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Expenses | LifeOS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="app-header">
        <div class="logo-brand">Expenses</div>
        <button onclick="openModal()" style="background:var(--primary); border:none; color:white; padding:8px 16px; border-radius:12px; font-weight:800; font-size:0.75rem;">+ LOG SPEND</button>
    </header>

    <div style="padding: 0 20px;">
        <div class="card" style="background: linear-gradient(135deg, #0f172a, #1e1b4b); border: 1px solid var(--primary); text-align:center;">
            <p style="font-size:0.7rem; font-weight:800; letter-spacing:1px; opacity:0.6;">CURRENT MONTH SPEND</p>
            <h1 id="month-total" style="font-size:3rem; margin:10px 0; color:var(--primary); text-shadow:0 0 20px var(--glow);">₹0</h1>
            <p id="budget-status" style="font-size:0.8rem; color:#10b981; font-weight:600;">Within Budget Limit</p>
        </div>

        <h3 style="margin:20px 0 15px; font-size:1rem; font-weight:800;">RECENT TRANSACTIONS</h3>
        <div id="expense-list">
             <!-- List items injected by JS -->
        </div>
    </div>

    <!-- Add Expense Bottom Sheet -->
    <div id="exp-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; align-items:flex-end;">
        <div class="bottom-sheet" style="width:100%;">
            <div style="width:40px; height:4px; background:rgba(255,255,255,0.1); margin: -10px auto 20px; border-radius:10px;"></div>
            <h3 style="margin-bottom:20px; font-weight:800;">Log New Expense</h3>
            <form id="expense-form">
                <input type="number" id="amt" placeholder="Amount (₹)" required>
                <input type="text" id="description" placeholder="Description" required>
                <select id="cat">
                    <option value="food">🍔 Food & Drinks</option>
                    <option value="transport">🚗 Transport</option>
                    <option value="bills">⚡ Bills & Utilities</option>
                    <option value="shopping">🛍️ Shopping</option>
                </select>
                <button type="submit" class="btn-primary" style="margin-top:10px;">SAVE TRANSACTION</button>
                <button type="button" onclick="closeModal()" style="width:100%; background:none; border:none; color:var(--text-dim); margin-top:15px; font-weight:600;">CANCEL</button>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link"><i class="ri-home-6-line"></i><span>Home</span></a>
        <a href="vault.html" class="nav-link"><i class="ri-shield-keyhole-line"></i><span>Vault</span></a>
        <a href="expenses.html" class="nav-link active"><i class="ri-wallet-fill"></i><span>Spent</span></a>
        <a href="reminders.html" class="nav-link"><i class="ri-notification-3-line"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-heart-line"></i><span>Profile</span></a>
    </nav>

    <script src="js/supabase-config.js"></script>
    <script src="js/expenses.js"></script>
    <script>
        function openModal() { document.getElementById('exp-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('exp-modal').style.display = 'none'; }
    </script>
</body>
</html>
