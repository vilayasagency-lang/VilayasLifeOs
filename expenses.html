<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Expenses | LifeOS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="brand">Expenses</div>
        <button onclick="openEx()" class="btn-primary" style="width:auto; padding:8px 16px; font-size:0.7rem;">+ ADD</button>
    </header>

    <div class="container fade-in">
        <div class="card" style="background: linear-gradient(135deg, #0f172a, #1e1b4b); border:1px solid var(--primary); text-align:center;">
            <p style="font-size:0.7rem; font-weight:800; letter-spacing:1px; opacity:0.5;">MONTHLY BALANCE</p>
            <h1 id="ex-total" style="font-size:3rem; color:var(--primary); text-shadow:0 0 20px rgba(59,130,246,0.5);">₹0</h1>
        </div>

        <h3 style="font-size:0.9rem; font-weight:800; margin:20px 0 15px;">TRANSACTIONS</h3>
        <div id="ex-list"></div>
    </div>

    <!-- Add Expense Sheet -->
    <div id="ex-modal" class="modal-overlay" onclick="if(event.target==this) closeEx()">
        <div class="bottom-sheet">
            <h3 style="margin-bottom:20px; font-weight:800;">Log Expense</h3>
            <form id="ex-form">
                <input type="number" id="ex-amt" placeholder="Amount (₹)" required>
                <input type="text" id="ex-desc" placeholder="What did you buy?" required>
                <select id="ex-cat">
                    <option value="food">🍔 Food</option>
                    <option value="transport">🚗 Transport</option>
                    <option value="bills">⚡ Bills</option>
                </select>
                <button type="submit" class="btn-primary">Save Expense</button>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link"><i class="ri-home-6-line"></i><span>Home</span></a>
        <a href="vault.html" class="nav-link"><i class="ri-shield-keyhole-line"></i><span>Vault</span></a>
        <a href="expenses.html" class="nav-link active"><i class="ri-wallet-fill"></i><span>Spent</span></a>
        <a href="reminders.html" class="nav-link"><i class="ri-notification-3-line"></i><span>Alerts</span></a>
        <a href="profile.html" class="nav-link"><i class="ri-user-6-line"></i><span>Profile</span></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/expenses.js"></script>
    <script>
        function openEx() { document.getElementById('ex-modal').style.display = 'flex'; }
        function closeEx() { document.getElementById('ex-modal').style.display = 'none'; }
    </script>
</body>
</html>
