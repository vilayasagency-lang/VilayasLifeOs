<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#05070a;">
    <header class="app-header">
        <div class="logo">Admin OS</div>
        <div class="badge" style="background:var(--primary); padding:5px 10px; border-radius:8px; font-size:0.7rem;">SYSTEM LIVE</div>
    </header>

    <div class="app-container">
        <div class="card">
            <p>Total Revenue (Monthly)</p>
            <h2 id="total-revenue">₹0.00</h2>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div class="card"><p>Total Users</p><h3 id="user-count">0</h3></div>
            <div class="card"><p>R2 Usage</p><h3 id="r2-usage">0 GB</h3></div>
        </div>

        <h3 style="margin:20px 0 10px;">Recent Activity</h3>
        <div id="logs" style="font-family:monospace; font-size:0.7rem; color:#10b981; background:black; padding:15px; border-radius:15px; border:1px solid #111;">
            > System initialization complete...<br>
            > Worker: Payment Webhook listening...
        </div>
    </div>
    
    <script src="js/supabase-config.js"></script>
    <script src="js/api.js"></script>
    <script>
        // Simple Admin Logic
        document.addEventListener('DOMContentLoaded', async () => {
            const stats = await api.getAdminStats();
            document.getElementById('r2-usage').innerText = stats.storageUsedGB + " GB";
        });
    </script>
</body>
</html>
